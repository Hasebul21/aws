services:
  # The "Traffic Cop" - Handles all incoming web requests
  nginx:
    image: nginx:alpine
    container_name: aws-practice-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    container_name: aws-practice-db
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Port 5432 is removed from public access for security
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: aws-practice-backend
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: usersdb
    depends_on:
      - db
    # Port 4000 is removed; Nginx talks to this internally

  frontend:
    build:
      context: ./frontend
    container_name: aws-practice-frontend
    depends_on:
      - backend
    # Port 5173/80 is removed; Nginx talks to this internally

volumes:
  db_data:
