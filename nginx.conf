server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:4000/; 
        proxy_set_header Host $host;
    }

    location / {
        # On EC2, the 'production' stage of our Dockerfile listens on 80
        proxy_pass http://frontend:80; 
        proxy_set_header Host $host;
    }
}
